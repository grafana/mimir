name: Regenerate docs and helm tests

# configure trigger by pull request
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'operations/helm/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    if: github.event.pull_request.user.login == 'renovate-sh-app[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Get build image from Makefile
        id: build_image_step
        run: echo "build_image=$(make print-build-image)" >> "$GITHUB_OUTPUT"
    outputs:
      build_image: ${{ steps.build_image_step.outputs.build_image }}

  lint_and_update:
    runs-on: ubuntu-latest
    needs:
      - prepare
    container:
      image: ${{ needs.prepare.outputs.build_image }} # zizmor: ignore[unpinned-images] The image output produced by the prepare step is pinned
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.check_updates.outputs.has_changes }}
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Mark workspace as safe
        run: git config --global --add safe.directory '*'

      - name: Regenerate docs and helm tests
        run: make BUILD_IN_CONTAINER=false doc build-helm-tests

      - name: Check whether helm tests and docs changed
        id: check_updates
        run: |
          if ./tools/find-diff-or-untracked.sh operations/helm/; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # The regenerated helm tests and docs are tarred (to preserve symlinks, which actions/upload-artifact
      # otherwise dereferences) and uploaded so that the next job, running on the host runner, can commit
      # them via the GitHub API. The split is needed because planetscale/ghcommit-action is a Docker action
      # and cannot run inside a container job.
      - name: Archive regenerated helm tests and docs
        if: steps.check_updates.outputs.has_changes == 'true'
        run: tar -cf regenerated-helm.tar operations/helm

      - name: Upload regenerated helm tests and docs
        if: steps.check_updates.outputs.has_changes == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: regenerated-helm
          path: regenerated-helm.tar
          retention-days: 1

  commit_changes:
    runs-on: ubuntu-latest
    needs:
      - lint_and_update
    if: needs.lint_and_update.outputs.has_changes == 'true'
    permissions:
      contents: read
      # Required by create-github-app-token, which retrieves App credentials from Vault via OIDC.
      id-token: write
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Download regenerated helm tests and docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: regenerated-helm

      # Replace operations/helm with the freshly regenerated content so that ghcommit-action commits
      # exactly the diff that the previous job produced (including any deletions). The tarball preserves
      # symlinks that point outside operations/helm (e.g. mixins/dashboards), which a plain artifact upload
      # would otherwise dereference into materialized files.
      - name: Replace operations/helm with regenerated content
        run: |
          rm -rf operations/helm
          tar -xf regenerated-helm.tar

      - name: Generate GitHub App Token
        id: app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        with:
          github_app: mimir-github-bot

      - name: Commit regenerated helm tests and docs to PR branch
        uses: planetscale/ghcommit-action@a6b150b81dca5dd027baa898604418eec9e11465 # v0.2.22
        with:
          commit_message: "Update build with regenerated helm tests and docs"
          repo: ${{ github.event.pull_request.head.repo.full_name }}
          branch: ${{ github.head_ref }}
          file_pattern: operations/helm/
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
