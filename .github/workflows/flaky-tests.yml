name: Flaky Tests Detection

on:
  schedule:
    - cron: "0 2 * * 1" # Run every Monday at 2 AM
  workflow_dispatch:
    inputs:
      skip-posting-issues:
        description: 'Skip creating/updating GitHub issues (preview mode)'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  analyze-flaky-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: '0' # we need all commits so that the git history check returns valid commits
          persist-credentials: false

      - name: Retrieve Secrets from Vault
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a53fc80bc30b0a16a262520465db899fa3af08b7 # get-vault-secrets/v1.3.2
        with:
          repo_secrets: |
            LOKI_URL=flaky-tests-bot:loki-url
            LOKI_USERNAME=flaky-tests-bot:loki-username
            LOKI_PASSWORD=flaky-tests-bot:loki-password

      - name: Generate GitHub App Token
        id: github-token
        uses: grafana/shared-workflows/actions/create-github-app-token@580590a644e82e79bb2598bdaba0be245a14dda0 # create-github-app-token/v0.2.2
        with:
          github_app: mimir-github-bot

      - name: Run Flaky Tests Analysis
        uses: grafana/shared-workflows/actions/go-flaky-tests@fda601c4163fc8b5558029918e4e6259a2359682
        with:
          loki-url: ${{ env.LOKI_URL }}
          loki-username: ${{ env.LOKI_USERNAME }}
          loki-password: ${{ env.LOKI_PASSWORD }}
          repository: ${{ github.repository }}
          time-range: "7d"
          top-k: "3"
          skip-posting-issues: ${{ github.event_name == 'workflow_dispatch' && inputs.skip-posting-issues || 'false' }}
          ignored-tests: "TestOurUpstreamTestCasesAreInSyncWithUpstream" # TestOurUpstreamTestCasesAreInSyncWithUpstream is supposed to block upstream mimir-prometheus updates, so it's also expected to fail.
        env:
          GITHUB_TOKEN: ${{ steps.github-token.outputs.token }}
