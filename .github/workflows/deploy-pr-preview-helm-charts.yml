name: Deploy pr preview (Helm charts)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - closed
    paths:
      - "docs/sources/helm-charts/**"

jobs:
  deploy-pr-preview:
    permissions:
      contents: read # Clone repository.
      id-token: write # Fetch Vault secrets.
      pull-requests: write # Create or update pull request comments.
      statuses: write # Update GitHub status check with deploy preview link.
    if: "!github.event.pull_request.head.repo.fork"
    # Must reference @main (not a pinned SHA): the OIDC trust policy for the
    # service account used by deploy-preview.yml only trusts the "main" ref of
    # grafana/writers-toolkit, so pinning to a commit SHA breaks token exchange.
    uses: grafana/writers-toolkit/.github/workflows/deploy-preview.yml@main
    with:
      branch: ${{ github.head_ref }}
      event_number: ${{ github.event.number }}
      repo: mimir
      sha: ${{ github.event.pull_request.head.sha }}
      sources: |
        [
          {
            "index_file": null,
            "relative_prefix": "/docs/mimir/v3.1.x/",
            "repo": "mimir",
            "source_directory": "docs/sources/mimir",
            "website_directory": "content/docs/mimir/v3.1.x"
          },
          {
            "index_file": "content/docs/helm-charts/mimir-distributed/_index.md",
            "relative_prefix": "/docs/helm-charts/mimir-distributed/next/",
            "repo": "mimir",
            "source_directory": "docs/sources/helm-charts/mimir-distributed",
            "website_directory": "content/docs/helm-charts/mimir-distributed/next"
          }
        ]
      title: Helm chart
