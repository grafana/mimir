# Same as warmup-go-build-cache-on-host.yml but runs inside a container image.
# Used by the warmup-go-build-cache-unit-tests job in test-build-deploy.yml, which needs the
# build container because unit tests compile with CGO_ENABLED=1 -race (requiring the C toolchain
# in the container).
# See warmup-go-build-cache-on-host.yml for how the Go build cache warmup works.
name: Warmup Go build cache (in container)

on:
  workflow_call:
    inputs:
      container-image:
        description: Container image to run in
        required: true
        type: string
      cache-key-prefix:
        description: Cache key prefix (e.g., "go-build-cache-unit")
        required: true
        type: string
      make-target:
        description: Makefile target to run for warming the cache
        required: true
        type: string
      force:
        description: Force cache warmup even on non-main branches
        required: false
        type: boolean
        default: false

jobs:
  warmup:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.container-image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: github.ref == 'refs/heads/main' || inputs.force
        with:
          persist-credentials: false
          sparse-checkout: go.sum
      # enableCrossOsArchive is required because actions/cache sees a different OS identifier
      # inside a container than on the host runner. Both the save and restore must use this
      # flag, otherwise the OS is included in the cache version hash and the restore would miss.
      - name: Check if Go build cache exists
        id: check-cache
        if: github.ref == 'refs/heads/main' || inputs.force
        uses: actions/cache/restore@v4
        with:
          path: /go/cache
          key: ${{ inputs.cache-key-prefix }}-${{ hashFiles('go.sum') }}
          enableCrossOsArchive: true
          lookup-only: true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.check-cache.outputs.cache-hit != 'true' && (github.ref == 'refs/heads/main' || inputs.force)
        with:
          persist-credentials: false
      - name: Run Git Config
        if: steps.check-cache.outputs.cache-hit != 'true' && (github.ref == 'refs/heads/main' || inputs.force)
        run: git config --global --add safe.directory '*'
      - name: Warm Go build cache
        if: steps.check-cache.outputs.cache-hit != 'true' && (github.ref == 'refs/heads/main' || inputs.force)
        run: make BUILD_IN_CONTAINER=false "$MAKE_TARGET"
        env:
          MAKE_TARGET: ${{ inputs.make-target }}
      - name: Print Go build cache size
        if: steps.check-cache.outputs.cache-hit != 'true' && (github.ref == 'refs/heads/main' || inputs.force)
        run: du -sh /go/cache
      - uses: actions/cache/save@v4
        if: steps.check-cache.outputs.cache-hit != 'true' && (github.ref == 'refs/heads/main' || inputs.force)
        with:
          path: /go/cache
          key: ${{ inputs.cache-key-prefix }}-${{ hashFiles('go.sum') }}
          enableCrossOsArchive: true
