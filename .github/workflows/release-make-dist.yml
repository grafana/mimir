# SPDX-License-Identifier: AGPL-3.0-only
#
# This workflow is triggered when a draft GitHub release is created for a Mimir
# tag. It builds the dist artifacts across all supported OS/arch combinations
# (mirroring the build-dist matrix in the CI workflow), builds DEB/RPM packages,
# and attaches all artifacts to the draft release so that they are ready for
# review before the release is published.
#
# It can also be triggered manually via workflow_dispatch, providing a release
# tag, to re-run the build and re-attach artifacts to an existing draft release.

name: release-make-dist

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (tag, branch, or SHA; e.g. mimir-2.14.0)'
        required: true
        type: string
      dry_run:
        description: 'List artifacts that would be uploaded instead of uploading them'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # Only run for draft releases whose tag matches the Mimir release tag pattern.
  prepare:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.release.draft == true && startsWith(github.ref, 'refs/tags/mimir-'))
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
          sparse-checkout: |
            Makefile
          sparse-checkout-cone-mode: false
      - name: Get build image from Makefile
        id: build_image_step
        run: echo "build_image=$(make print-build-image)" >> "$GITHUB_OUTPUT"
      - name: Get supported OS/arch for dist builds
        id: dist_matrix_step
        run: |
          matrix=$(make print-supported-os-arch | jq -Rc 'split("\t") | {os: .[0], arch: .[1]}' | jq -sc '{include: .}')
          echo "dist_matrix=$matrix" >> "$GITHUB_OUTPUT"
      - name: Get release tag
        id: release_tag_step
        env:
          INPUT_REF: ${{ inputs.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "release_tag=${INPUT_REF:-$REF_NAME}" >> "$GITHUB_OUTPUT"
    outputs:
      build_image: ${{ steps.build_image_step.outputs.build_image }}
      dist_matrix: ${{ steps.dist_matrix_step.outputs.dist_matrix }}
      release_tag: ${{ steps.release_tag_step.outputs.release_tag }}

  build-dist:
    runs-on: ubuntu-latest
    name: build-dist (${{ matrix.os }}, ${{ matrix.arch }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.dist_matrix) }}
    container:
      image: ${{ needs.prepare.outputs.build_image }} # zizmor: ignore[unpinned-images] The image output produced by the prepare step is pinned
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ needs.prepare.outputs.release_tag }}
      - name: Restore Go build cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /go/cache
          key: go-build-cache-image-and-lint-${{ needs.prepare.outputs.build_image }}-${{ hashFiles('go.sum') }}
          restore-keys: go-build-cache-image-and-lint-${{ needs.prepare.outputs.build_image }}-
      - name: Run Git Config
        run: git config --global --add safe.directory '*'
      - name: Build
        run: make BUILD_IN_CONTAINER=false dist GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }}
      - name: Upload dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
          retention-days: 1

  build-packages:
    # Runs on ubuntu-latest (not inside the build container) because nfpm.sh
    # needs Docker to run the jsonnet, envsubst, and nfpm helper containers.
    runs-on: ubuntu-latest
    needs: [prepare, build-dist]
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ needs.prepare.outputs.release_tag }}
      - name: Download linux dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: dist-linux-*
          path: dist
          merge-multiple: true
      - name: Build DEB/RPM packages
        run: make packages
      - name: Upload packages artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.deb-sha-256
            dist/*.rpm-sha-256
          retention-days: 1

  upload-to-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-dist
      - build-packages
    permissions:
      contents: write
    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Download packages artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages
          path: packages
      - name: List artifacts
        run: |
          for dir in dist packages; do
            echo "=== ${dir}/ ==="
            for f in "${dir}"/*; do
              [ -f "$f" ] || continue
              size=$(numfmt --to=iec "$(stat -c %s "$f")")
              digest=$(sha256sum "$f" | cut -d' ' -f1)
              printf '%s  %s  sha256:%s\n' "$(basename "$f")" "$size" "$digest"
            done
          done
      - name: Upload artifacts to draft release
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.prepare.outputs.release_tag }}" dist/* --clobber --repo "${{ github.repository }}"
          gh release upload "${{ needs.prepare.outputs.release_tag }}" packages/* --clobber --repo "${{ github.repository }}"
