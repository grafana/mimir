# Restore Go build cache saved by a warmup-go-build-cache-* reusable workflow.
#
# actions/cache includes the path in its version hash, so the restore path must match
# the path used by the warmup job that saved the cache. When the consuming job runs in
# a different environment (e.g. host warmup → container build), the restored cache is
# moved to $GOCACHE.
name: Restore Go build cache
description: Restores the Go build cache saved by a warmup job and moves it to GOCACHE if needed.
inputs:
  cache-key:
    description: Cache key to restore (must match the key used by the warmup job)
    required: true
  restore-path:
    description: Path the cache was saved from (must match the warmup job's save path)
    required: false
    default: /home/runner/.cache/go-build
runs:
  using: composite
  steps:
    - name: Restore Go build cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.restore-path }}
        key: ${{ inputs.cache-key }}
        enableCrossOsArchive: true
    - name: Move Go build cache to GOCACHE
      shell: bash
      run: |
        if [ -d "$RESTORE_PATH" ] && [ "$RESTORE_PATH" != "$GOCACHE" ]; then
          rm -rf "$GOCACHE"
          mv "$RESTORE_PATH" "$GOCACHE"
        fi
      env:
        RESTORE_PATH: ${{ inputs.restore-path }}
