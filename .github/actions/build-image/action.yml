name: Build image
description: Builds an image and exports it as a workflow artifact
inputs:
  artifact_name:
    description: workflow artifact name
    required: true
  target:
    description: make target to run
    required: true
runs:
  using: composite
  steps:
    - name: Run Git Config
      shell: bash
      run: git config --global --add safe.directory '*'
    - name: Install Docker Client
      shell: bash
      run: ./.github/workflows/scripts/install-docker.sh
    - name: Set up QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    - name: Symlink Expected Path to Workspace
      shell: bash
      run: |
        mkdir -p /go/src/github.com/grafana/mimir
        ln -s $GITHUB_WORKSPACE/* /go/src/github.com/grafana/mimir
    # TEMPORARY (wiresmith migration): the wiresmith proto generator is not yet
    # part of the published mimir-build-image, so install it on PATH before the
    # build regenerates *.pb.go. Built from a checkout because wiresmith's go.mod
    # carries a replace directive, which blocks `go install pkg@version`.
    # Remove once wiresmith ships in the build image.
    - name: Install wiresmith proto generator
      shell: bash
      env:
        GOPRIVATE: github.com/grafana/*
      run: |
        git clone --quiet --filter=blob:none https://github.com/grafana/wiresmith.git /tmp/wiresmith-src
        git -C /tmp/wiresmith-src checkout --quiet a6d80cb6d9caa5a6828f816bf9f561ba1a5f7ece
        (cd /tmp/wiresmith-src && go install ./cmd/wiresmith)
    - name: Build Docker Image
      shell: bash
      run: |
        OUTPUT_DIR=/tmp/images
        mkdir "$OUTPUT_DIR"
        
        DIRNAME="$(dirname "$TARGET")"
        NAME="$(basename "$DIRNAME")"
        make \
          BUILD_IN_CONTAINER=false \
          PUSH_MULTIARCH_TARGET="type=oci,dest=$OUTPUT_DIR/$NAME.oci" \
          push-multiarch-$TARGET
      env:
        TARGET: ${{ inputs.target }}
    - name: Create Archive With Docker Images
      shell: bash
      run: |
        tar cvf images.tar -C /tmp/images .
    - name: Upload Archive with Docker Images
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ inputs.artifact_name }}
        path: ./images.tar
