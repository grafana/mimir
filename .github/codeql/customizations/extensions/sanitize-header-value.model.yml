extensions:
  - addsTo:
      pack: codeql/go-all
      extensible: sanitizerModel
    data:
      # Treat the first return value of sanitizeHeaderValue as a sanitized output
      # for go/clear-text-logging. The function is gated by the safeHeader type
      # (its second parameter), which the package's internal discipline guarantees
      # has been validated against the sensitive-header deny list before reaching
      # this call.
      #
      # Columns: package, type, subtypes, name, signature, ext, output, kind, provenance
      - ["github.com/grafana/mimir/pkg/frontend/transport", "", false, "sanitizeHeaderValue", "", "", "ReturnValue[0]", "clear-text-logging", "manual"]
