syntax = "proto3";

package distributor;

import "github.com/grafana/mimir/pkg/mimirpb/mimir.proto";
import "wiresmith/options.proto";

option go_package = "github.com/grafana/mimir/pkg/distributor/distributorpb";
option (wiresmith.options.no_presence_all) = true;

service Distributor {
  rpc Push(cortexpb.WriteRequest) returns (cortexpb.WriteResponse) {}
}
