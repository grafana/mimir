syntax = "proto3";

package querierpb;

import "github.com/grafana/mimir/pkg/mimirpb/mimir.proto";
import "github.com/grafana/mimir/pkg/querier/stats/stats.proto";
import "github.com/grafana/mimir/pkg/streamingpromql/planning/plan.proto";
import "github.com/grafana/mimir/pkg/streamingpromql/types/types.proto";
import "wiresmith/options.proto";

option go_package = "querierpb";
// Note: gogoproto.marshaler_all / unmarshaler_all are unnecessary under
// wiresmith — Marshal/Unmarshal methods are always emitted. no_presence_all
// keeps gogoproto value semantics (no presence bitmap, declared-fields-only
// struct layout).
option (wiresmith.options.no_presence_all) = true;

message EvaluateQueryRequest {
  planning.EncodedQueryPlan plan = 1;
  repeated EvaluationNode nodes = 2;
  reserved 3; // Formerly: enablePerStepStats
  uint64 batchSize = 4;
  // seriesMetadataBatchSize is the maximum number of series metadata entries to include in a single
  // EvaluateQueryResponseSeriesMetadata message. A non-zero value indicates that the query-frontend
  // supports receiving batched series metadata messages (ie. multiple EvaluateQueryResponseSeriesMetadata
  // messages per node).
  uint64 seriesMetadataBatchSize = 5;
  bool enablePerNodeAnnotations = 6;
}

message EvaluationNode {
  int64 nodeIndex = 1;
  types.EncodedQueryTimeRange timeRange = 2;
}

message EvaluateQueryResponse {
  oneof message {
    EvaluateQueryResponseSeriesMetadata seriesMetadata = 1;
    EvaluateQueryResponseStringValue stringValue = 2;
    EvaluateQueryResponseScalarValue scalarValue = 3;
    EvaluateQueryResponseInstantVectorSeriesData instantVectorSeriesData = 4;
    EvaluateQueryResponseRangeVectorStepData rangeVectorStepData = 5;
    EvaluateQueryResponseEvaluationCompleted evaluationCompleted = 6;
  }
}

message EvaluateQueryResponseSeriesMetadata {
  int64 nodeIndex = 1;
  repeated SeriesMetadata series = 2;

  // totalSeriesCountForNode is non-zero if the EvaluateQueryRequest has a non-zero seriesMetadataBatchSize and the
  // querier supports batching series metadata messages.
  // Why send a total count rather than a "more messages to come" flag? Sending the count allows the query-frontend to
  // allocate a slice of exactly the right length to hold all series.
  int64 totalSeriesCountForNode = 3;
}

message SeriesMetadata {
  repeated cortexpb.LabelPair labels = 1 [(wiresmith.options.customtype) = "github.com/grafana/mimir/pkg/mimirpb.LabelAdapter"];
  bool dropName = 2;
}

message EvaluateQueryResponseStringValue {
  int64 nodeIndex = 1;
  string value = 2;
}

message EvaluateQueryResponseScalarValue {
  int64 nodeIndex = 1;
  repeated cortexpb.Sample values = 2;
}

message EvaluateQueryResponseInstantVectorSeriesData {
  int64 nodeIndex = 1;
  repeated InstantVectorSeriesData series = 2;
}

message InstantVectorSeriesData {
  repeated cortexpb.Sample floats = 1;
  repeated cortexpb.FloatHistogramPair histograms = 2;
}

message EvaluateQueryResponseRangeVectorStepData {
  int64 nodeIndex = 1;
  int64 seriesIndex = 2;

  // These timestamps have the same meaning as the corresponding fields on RangeVectorStepData.
  int64 step_t = 3;
  int64 range_start = 4;
  int64 range_end = 5;

  repeated cortexpb.Sample floats = 6;
  repeated cortexpb.FloatHistogramPair histograms = 7;
}

message Error {
  cortexpb.QueryErrorType type = 1;
  string message = 2;
}

message EvaluateQueryResponseEvaluationCompleted {
  Annotations annotations = 1; // Deprecated, retained only for backwards compatibility with query-frontends that do not support per-node annotations.
  stats.Stats stats = 2;
  map<int64, types.EncodedOperatorEvaluationStats> perNodeStats = 3;
  map<int64, Annotations> perNodeAnnotations = 4;
}

message Annotations {
  repeated string warnings = 1;
  repeated string infos = 2;
}
