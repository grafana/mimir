syntax = "proto3";
package thanos;

import "github.com/grafana/mimir/pkg/storegateway/storepb/types.proto";
import "google/protobuf/any.proto";
import "wiresmith/options.proto";

option go_package = "storepb";
// enum_no_prefix_all reproduces gogoproto's unprefixed enum value constants
// (ORDER_BY_VALUE_ASC, FUZZ_ALG_SUBSEQUENCE, ...).
option (wiresmith.options.enum_no_prefix_all) = true;
// no_presence_all reproduces the gogoproto goproto_{unkeyed,unrecognized,
// sizecache}_all=false layout (declared-fields-only, no presence bitmap).
option (wiresmith.options.no_presence_all) = true;

message SeriesRequest {
  int64 min_time = 1;
  int64 max_time = 2;
  repeated LabelMatcher matchers = 3;

  // Thanos max_resolution_window.
  reserved 4;

  // Thanos aggregates.
  reserved 5;

  // Thanos partial_response_disabled.
  reserved 6;

  // Thanos partial_response_strategy.
  reserved 7;

  // skip_chunks controls whether sending chunks or not in series responses.
  bool skip_chunks = 8;

  // hints is an opaque data structure that can be used to carry additional information.
  // The content of this field and whether it's supported depends on the
  // implementation of a specific store.
  //
  // Deprecated: use request_hints instead.
  //
  // The payload is a gogo-registry hintspb message unpacked via gogo
  // types.UnmarshalAny, so this Any bridges to gogo types.Any via AnyAdapter.
  google.protobuf.Any hints = 9 [(wiresmith.options.customtype) = "AnyAdapter"];

  // Thanos step.
  reserved 10;

  // Thanos range.
  reserved 11;

  // Thanos query_hints.
  reserved 12;

  // Thanos shard_info.
  reserved 13;

  // Additional information from the read path that the store can use to more efficiently
  // return series.
  SeriesRequestHints request_hints = 14 [(wiresmith.options.pointer) = true];

  // limit is the maximum number of series to return. The store-gateway applies it after
  // merging and deduplicating series across blocks, so it avoids loading chunks for series
  // beyond the limit. A value of 0 (the default) means no limit is applied.
  int64 limit = 15;

  // If streaming_chunks_batch_size=0, the response must only contain one 'series' at a time
  // with the series labels and chunks data sent together.
  // If streaming_chunks_batch_size > 0
  // - The store may choose to send the streaming_series/streaming_chunks OR behave as
  //   if streaming_chunks_batch_size=0 if it does not support streaming series.
  // - The store must not send a mix of 'series' and streaming_series/streaming_chunks for a single request.
  // - If the store chooses to send streaming series, all the streaming_series must be sent before
  //   sending any streaming_chunks, with the last streaming_series response containing is_end_of_series_stream=true.
  //   The order of series in both streaming_series/streaming_chunks must match and the size of the batch must not
  //   cross streaming_chunks_batch_size, although it can be lower than that.
  // The proto field ID is 100 so that we have an option to bring back compatibility with Thanos' storage API.
  uint64 streaming_chunks_batch_size = 100;
}

message SeriesRequestHints {
  // block_matchers is a list of label matchers that are evaluated against each single block's
  // labels to filter which blocks get queried. If the list is empty, no per-block filtering
  // is applied.
  repeated thanos.LabelMatcher block_matchers = 1;

  reserved 2; // projections include, not used anymore.
  reserved 3; // projections labels, not used anymore.
}

message Stats {
  // This is the sum of all fetched index bytes (postings + series) for a series request.
  uint64 fetched_index_bytes = 1;
}

message SeriesResponse {
  reserved 1; // non-streaming series are no longer supported or used.

  oneof result {
    // warning is considered an information piece in place of series for warning purposes.
    // It is used to warn store API user about suspicious cases or partial response (if enabled).
    string warning = 2;

    // hints is an opaque data structure that can be used to carry additional information from
    // the store. The content of this field and whether it's supported depends on the
    // implementation of a specific store. It's also implementation specific if it's allowed that
    // multiple SeriesResponse frames contain hints for a single Series() request and how should they
    // be handled in such case (ie. merged vs keep the first/last one).
    //
    // Deprecated: use response_hints instead.
    //
    // customtype cannot be applied to oneof variants, so this keeps wiresmith's
    // native anypb.Any; the querier bridges it to gogo types.Any at the single
    // read site (blocks_store_queryable.go) for gogo types.UnmarshalAny.
    google.protobuf.Any hints = 3;

    // stats is a object containing stats for a series response from the store-gateways so that we can collect stats
    // related to the processing the series response on store-gateways did available to the querier and query-frontends.
    Stats stats = 4;

    // streaming_series is a list of series labels sent as part of a streaming Series call.
    // These are populated only when streaming_chunks_batch_size > 0 in the series request.
    // Series are sent in batches because sending one at a time has additional CPU overhead for not much memory gains.
    StreamingSeriesBatch streaming_series = 5;

    // streaming_chunks is a list of chunks sent as part of a streaming Series request.
    // They are associated with series labels sent as streaming_series earlier in the same Series request.
    // These are populated only when streaming_chunks_batch_size > 0 in the series request.
    // Chunks are sent in batches because sending one series' chunks at a time has additional
    // CPU overhead for not much memory gains.
    StreamingChunksBatch streaming_chunks = 6;

    // streaming_chunks_estimate contains an estimate of the number of chunks expected to be sent as part a streaming
    // Series call.
    StreamingChunksEstimate streaming_chunks_estimate = 7;

    // response_hints contains additional information from the store about the response.
    SeriesResponseHints response_hints = 8;
  }
}

message SeriesResponseHints {
  // queried_blocks is the list of blocks that have been queried.
  repeated Block queried_blocks = 1;
}

message Block {
  string id = 1;
}

message LabelNamesRequest {
  // Thanos partial_response_disabled.
  reserved 1;

  // Thanos partial_response_strategy.
  reserved 2;

  int64 start = 3;

  int64 end = 4;

  // hints is an opaque data structure that can be used to carry additional information.
  // The content of this field and whether it's supported depends on the
  // implementation of a specific store.
  //
  // Deprecated: use request_hints instead.
  google.protobuf.Any hints = 5 [(wiresmith.options.customtype) = "AnyAdapter"];

  repeated LabelMatcher matchers = 6;

  int64 limit = 7;

  LabelNamesRequestHints request_hints = 8 [(wiresmith.options.pointer) = true];
}

message LabelNamesRequestHints {
  // block_matchers is a list of label matchers that are evaluated against each single block's
  // labels to filter which blocks get queried. If the list is empty, no per-block filtering
  // is applied.
  repeated thanos.LabelMatcher block_matchers = 1;
}

message LabelNamesResponse {
  repeated string names = 1;
  repeated string warnings = 2;

  // hints is an opaque data structure that can be used to carry additional information from
  // the store. The content of this field and whether it's supported depends on the
  // implementation of a specific store.
  //
  // Deprecated: use response_hints instead.
  google.protobuf.Any hints = 3 [(wiresmith.options.customtype) = "AnyAdapter"];

  LabelNamesResponseHints response_hints = 4 [(wiresmith.options.pointer) = true];
}

message LabelNamesResponseHints {
  // queried_blocks is the list of blocks that have been queried.
  repeated Block queried_blocks = 1;
}

message LabelValuesRequest {
  string label = 1;

  // Thanos partial_response_disabled.
  reserved 2;

  // Thanos partial_response_strategy.
  reserved 3;

  int64 start = 4;

  int64 end = 5;

  // hints is an opaque data structure that can be used to carry additional information.
  // The content of this field and whether it's supported depends on the
  // implementation of a specific store.
  //
  // Deprecated: use request_hints instead.
  google.protobuf.Any hints = 6 [(wiresmith.options.customtype) = "AnyAdapter"];

  repeated LabelMatcher matchers = 7;

  int64 limit = 8;

  LabelValuesRequestHints request_hints = 9 [(wiresmith.options.pointer) = true];
}

message LabelValuesRequestHints {
  // block_matchers is a list of label matchers that are evaluated against each single block's
  // labels to filter which blocks get queried. If the list is empty, no per-block filtering
  // is applied.
  repeated thanos.LabelMatcher block_matchers = 1;
}

message LabelValuesResponse {
  repeated string values = 1;
  repeated string warnings = 2;

  // hints is an opaque data structure that can be used to carry additional information from
  // the store. The content of this field and whether it's supported depends on the
  // implementation of a specific store.
  //
  // Deprecated: use response_hints instead.
  google.protobuf.Any hints = 3 [(wiresmith.options.customtype) = "AnyAdapter"];

  LabelValuesResponseHints response_hints = 4 [(wiresmith.options.pointer) = true];
}

message LabelValuesResponseHints {
  // queried_blocks is the list of blocks that have been queried.
  repeated Block queried_blocks = 1;
}

// SearchOrdering selects the result ordering wire-side. Values mirror the
// Prometheus storage.Ordering enum so the server-side translation is 1:1.
enum SearchOrdering {
  ORDER_BY_VALUE_ASC = 0;
  ORDER_BY_VALUE_DESC = 1;
  ORDER_BY_SCORE_DESC = 2;
}

// SearchFilter is the wire encoding of the filter applied to a search
// request. Field names match Prometheus PR #18573's HTTP URL params so the
// HTTP-to-gRPC translation in the querier (later PR) is verbatim.
message SearchFilter {
  // Terms are the search terms; combined with OR-max by filterOr at the server.
  repeated string terms = 1;
  // CaseInsensitive flips the search to be case-insensitive. The proto3 zero
  // value (false) means case-sensitive — matching Prometheus's HTTP
  // case_sensitive URL-param default of true. The HTTP handler in the later
  // PR translates the URL param to this wire bit (case_sensitive=false URL
  // param → case_insensitive=true wire bit).
  bool case_insensitive = 2;

  enum FuzzAlg {
    FUZZ_ALG_SUBSEQUENCE = 0;
    FUZZ_ALG_JARO_WINKLER = 1;
  }
  FuzzAlg fuzz_alg = 3;
  // FuzzThreshold is the minimum fuzzy score expressed as int 0-100,
  // matching Prometheus PR #18573's fuzz_threshold URL param. The server
  // divides by 100 to compare against the matcher's [0,1] score.
  int32 fuzz_threshold = 4;
}

message SearchLabelNamesRequest {
  int64 start = 1;
  int64 end = 2;
  repeated LabelMatcher matchers = 3;
  SearchFilter filter = 4 [(wiresmith.options.pointer) = true];
  SearchOrdering ordering = 5;
  int64 limit = 6;
  SearchLabelNamesRequestHints request_hints = 7 [(wiresmith.options.pointer) = true];
}

message SearchLabelNamesRequestHints {
  // block_matchers is a list of label matchers evaluated against each block's labels
  // to scope which blocks the store-gateway queries. Empty disables per-block filtering.
  // Mirrors the LabelNamesRequestHints semantics so the querier's per-replica block
  // assignment from queryWithConsistencyCheck is honoured.
  repeated LabelMatcher block_matchers = 1;
}

message SearchLabelValuesRequest {
  int64 start = 1;
  int64 end = 2;
  string label = 3;
  repeated LabelMatcher matchers = 4;
  SearchFilter filter = 5 [(wiresmith.options.pointer) = true];
  SearchOrdering ordering = 6;
  int64 limit = 7;
  SearchLabelValuesRequestHints request_hints = 8 [(wiresmith.options.pointer) = true];
}

message SearchLabelValuesRequestHints {
  // block_matchers is a list of label matchers evaluated against each block's labels
  // to scope which blocks the store-gateway queries. Empty disables per-block filtering.
  repeated LabelMatcher block_matchers = 1;
}

// SearchResultBatch carries one batch of (value, score) pairs in a streaming
// reply. Both SearchLabel{Names,Values} use this shape.
message SearchResultBatch {
  message Result {
    string value = 1;
    double score = 2;
  }
  repeated Result results = 1;
  repeated string warnings = 2;

  // response_hints reports which blocks the store-gateway actually queried
  // for this RPC. The querier feeds these into queryWithConsistencyCheck so
  // missing blocks (e.g. unloaded on the selected store-gateway) trigger a
  // retry instead of silently dropping results.
  SearchResponseHints response_hints = 3 [(wiresmith.options.pointer) = true];
}

message SearchResponseHints {
  // queried_blocks is the list of blocks that have been queried.
  repeated Block queried_blocks = 1;
}
