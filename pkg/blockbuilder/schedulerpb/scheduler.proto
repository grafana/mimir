syntax = "proto3";

package schedulerpb;

import "wiresmith/options.proto";

option go_package = "github.com/grafana/mimir/pkg/blockbuilder/schedulerpb";

option (wiresmith.options.no_presence_all) = true;

message JobKey {
  string id = 1;
  int64 epoch = 2;
}

message JobSpec {
  string topic = 1;
  int32 partition = 2;
  int64 start_offset = 3;
  int64 end_offset = 4;
}

service BlockBuilderScheduler {
  rpc AssignJob(AssignJobRequest) returns (AssignJobResponse);
  rpc UpdateJob(UpdateJobRequest) returns (UpdateJobResponse);
}

message AssignJobRequest {
  string worker_id = 1;
}

message AssignJobResponse {
  JobKey key = 1 [(wiresmith.options.pointer) = true];
  JobSpec spec = 2 [(wiresmith.options.pointer) = true];
}

message UpdateJobRequest {
  JobKey key = 1 [(wiresmith.options.pointer) = true];
  string worker_id = 2;
  JobSpec spec = 3 [(wiresmith.options.pointer) = true];
  bool complete = 4;
}

message UpdateJobResponse {}
