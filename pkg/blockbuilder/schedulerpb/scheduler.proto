syntax = "proto3";

package schedulerpb;

import "wiresmith/options.proto";

option go_package = "github.com/grafana/mimir/pkg/blockbuilder/schedulerpb";

option (wiresmith.options.no_presence_all) = true;

message JobKey {
  string id = 1;
  int64 epoch = 2;
}

message JobSpec {
  string topic = 1;
  int32 partition = 2;

  // Non-compartment mode: the single [start_offset, end_offset) range to
  // consume. Used when compartments are disabled.
  int64 start_offset = 3;
  int64 end_offset = 4;

  // Compartment mode: one [start_offset, end_offset) range per cluster, keyed by
  // cluster ID. When compartments are enabled, these are consumed instead of
  // start_offset/end_offset. Only clusters with new data to consume are
  // included; clusters with nothing to consume are omitted.
  // There should be at least one offset range set if compartments are enabled.
  map<int32, OffsetRange> offset_ranges = 5;
}

// OffsetRange is the range of offsets to consume from a single Kafka cluster's partition.
message OffsetRange {
  // start_offset is inclusive.
  int64 start_offset = 1;
  // end_offset is exclusive.
  int64 end_offset = 2;
}

service BlockBuilderScheduler {
  rpc AssignJob(AssignJobRequest) returns (AssignJobResponse);
  rpc UpdateJob(UpdateJobRequest) returns (UpdateJobResponse);
}

message AssignJobRequest {
  string worker_id = 1;
}

message AssignJobResponse {
  JobKey key = 1 [(wiresmith.options.pointer) = true];
  JobSpec spec = 2 [(wiresmith.options.pointer) = true];
}

message UpdateJobRequest {
  JobKey key = 1 [(wiresmith.options.pointer) = true];
  string worker_id = 2;
  JobSpec spec = 3 [(wiresmith.options.pointer) = true];
  bool complete = 4;
}

message UpdateJobResponse {}
