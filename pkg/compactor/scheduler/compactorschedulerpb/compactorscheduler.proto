syntax = "proto3";

package compactorschedulerpb;

import "wiresmith/options.proto";

option go_package = "github.com/grafana/mimir/pkg/compactor/scheduler/compactorschedulerpb";

option (wiresmith.options.no_presence_all) = true;
option (wiresmith.options.enum_no_prefix_all) = true;

message JobKey {
  string id = 1;
  int64 epoch = 2;
}

enum JobType {
  JOB_TYPE_UNKNOWN = 0;
  JOB_TYPE_COMPACTION = 1;
  JOB_TYPE_PLANNING = 2;
}

message JobSpec {
  string tenant = 1;
  // pointer = true: gogo nullable=true; call sites nil-check and use &CompactionJob{}.
  CompactionJob job = 2 [(wiresmith.options.pointer) = true];
  JobType job_type = 3;
}

message CompactionJob {
  repeated bytes block_ids = 1;
  bool split = 2;
  uint64 total_blocks_bytes = 3;
}

service CompactorScheduler {
  rpc LeaseJob(LeaseJobRequest) returns (LeaseJobResponse);
  rpc PlannedJobs(PlannedJobsRequest) returns (PlannedJobsResponse);
  rpc UpdatePlanJob(UpdatePlanJobRequest) returns (UpdateJobResponse);
  rpc UpdateCompactionJob(UpdateCompactionJobRequest) returns (UpdateJobResponse);
}

message LaneRequest {
  JobType job_type = 1;
}

message LeaseJobRequest {
  string worker_id = 1;
  repeated LaneRequest lane_requests = 2;
}

message LeaseJobResponse {
  // pointer = true: gogo nullable=true (default); call sites pass *JobKey/*JobSpec to helpers.
  JobKey key = 1 [(wiresmith.options.pointer) = true];
  JobSpec spec = 2 [(wiresmith.options.pointer) = true];
}

message PlannedCompactionJob {
  string id = 1;
  CompactionJob job = 2 [(wiresmith.options.pointer) = true];
}

message PlannedJobsRequest {
  JobKey key = 1 [(wiresmith.options.pointer) = true];
  string tenant = 2;
  repeated PlannedCompactionJob jobs = 3 [(wiresmith.options.pointer) = true];
}

message PlannedJobsResponse {}

enum UpdateType {
  UPDATE_TYPE_UNKNOWN = 0;
  UPDATE_TYPE_IN_PROGRESS = 1;
  UPDATE_TYPE_COMPLETE = 2;
  UPDATE_TYPE_REASSIGN = 3;
  UPDATE_TYPE_ABANDON = 4;
}

message UpdatePlanJobRequest {
  JobKey key = 1 [(wiresmith.options.pointer) = true];
  string tenant = 2;
  UpdateType update = 3;
}

message UpdateCompactionJobRequest {
  JobKey key = 1 [(wiresmith.options.pointer) = true];
  string tenant = 2;
  UpdateType update = 3;
}

message UpdateJobResponse {}

enum StoredJobStatus {
  STORED_JOB_STATUS_UNKNOWN = 0;
  STORED_JOB_STATUS_AVAILABLE = 1;
  STORED_JOB_STATUS_LEASED = 2;
  STORED_JOB_STATUS_COMPLETE = 3;
}

message StoredJobInfo {
  int64 creation_time = 1;
  StoredJobStatus status = 2;
  int64 status_time = 3;
  int32 num_leases = 4;
  int64 epoch = 5;
}

message StoredCompactionJob {
  // pointer = true: gogo nullable=true (default); serialized with &StoredJobInfo{}.
  StoredJobInfo info = 1 [(wiresmith.options.pointer) = true];
  CompactionJob job = 2 [(wiresmith.options.pointer) = true];
  uint32 order = 3;
}

message PersistenceMetadata {
  uint32 shard_count = 1;
  int64 creation_time = 2;
}
