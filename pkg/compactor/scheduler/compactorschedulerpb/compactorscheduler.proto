syntax = "proto3";

package compactorschedulerpb;

import "gogoproto/gogo.proto";

option go_package = "compactorschedulerpb";
option (gogoproto.marshaler_all) = true;
option (gogoproto.unmarshaler_all) = true;

message JobKey {
  string id = 1;
  int64 epoch = 2;
}

enum JobType {
  JOB_TYPE_UNKNOWN = 0;
  JOB_TYPE_COMPACTION = 1;
  JOB_TYPE_PLANNING = 2;
}

message JobSpec {
  string tenant = 1;
  CompactionJob job = 2;
  JobType job_type = 3;
}

message CompactionJob {
  repeated bytes block_ids = 1;
  bool split = 2;
  uint64 total_blocks_bytes = 3;
  uint64 total_series = 4;
}

service CompactorScheduler {
  rpc LeaseJob(LeaseJobRequest) returns (LeaseJobResponse);
  rpc PlannedJobs(PlannedJobsRequest) returns (PlannedJobsResponse);
  rpc UpdatePlanJob(UpdatePlanJobRequest) returns (UpdateJobResponse);
  rpc UpdateCompactionJob(UpdateCompactionJobRequest) returns (UpdateJobResponse);
}

message LaneRequest {
  JobType job_type = 1;
}

message LeaseJobRequest {
  string worker_id = 1;
  repeated LaneRequest lane_requests = 2;
}

message LeaseJobResponse {
  JobKey key = 1;
  JobSpec spec = 2;
}

message PlannedCompactionJob {
  string id = 1;
  CompactionJob job = 2;
}

message PlannedJobsRequest {
  JobKey key = 1;
  string tenant = 2;
  repeated PlannedCompactionJob jobs = 3;
}

message PlannedJobsResponse {}

enum UpdateType {
  UPDATE_TYPE_UNKNOWN = 0;
  UPDATE_TYPE_IN_PROGRESS = 1;
  UPDATE_TYPE_COMPLETE = 2;
  UPDATE_TYPE_REASSIGN = 3;
  UPDATE_TYPE_ABANDON = 4;
}

message UpdatePlanJobRequest {
  JobKey key = 1;
  string tenant = 2;
  UpdateType update = 3;
}

message UpdateCompactionJobRequest {
  JobKey key = 1;
  string tenant = 2;
  UpdateType update = 3;
}

message UpdateJobResponse {}

enum StoredJobStatus {
  STORED_JOB_STATUS_UNKNOWN = 0;
  STORED_JOB_STATUS_AVAILABLE = 1;
  STORED_JOB_STATUS_LEASED = 2;
  STORED_JOB_STATUS_COMPLETE = 3;
}

message StoredJobInfo {
  int64 creation_time = 1;
  StoredJobStatus status = 2;
  int64 status_time = 3;
  int32 num_leases = 4;
  int64 epoch = 5;
}

message StoredCompactionJob {
  StoredJobInfo info = 1;
  CompactionJob job = 2;
  uint32 order = 3;
}

message PersistenceMetadata {
  uint32 shard_count = 1;
  int64 creation_time = 2;
}

// StoredDurationPredictor persists the learned duration-predictor state. The version and k fields
// guard against loading state produced by an incompatible model: on mismatch the reader discards it
// and warm-starts from defaults. The a/b fields are the raw (row-major) sufficient statistics of the
// per-job-type least-squares fit. plan_ema is the moving average of observed planning-job durations
// (seconds), and plan_count is how many durations have been folded into it (0 means unlearned).
message StoredDurationPredictor {
  uint32 version = 1;
  uint32 k = 2;
  repeated double merge_a = 3;
  repeated double merge_b = 4;
  repeated double split_a = 5;
  repeated double split_b = 6;
  double plan_ema = 7;
  int64 plan_count = 8;
}
