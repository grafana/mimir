// Ruler Service Representation
// This service is used to retrieve the current state of rules running across
// all Rulers in a cluster. It allows mimir to fully serve the `/api/v1/{rules|alerts}`
// Prometheus API
syntax = "proto3";
package ruler;

import "github.com/grafana/mimir/pkg/mimirpb/mimir.proto";
import "github.com/grafana/mimir/pkg/ruler/rulespb/rules.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "wiresmith/options.proto";

option go_package = "github.com/grafana/mimir/pkg/ruler";
option (wiresmith.options.enum_no_prefix_all) = true;
option (wiresmith.options.no_presence_all) = true;

service Ruler {
  // Rules returns the currently loaded on the ruler instance for the authenticated tenant.
  rpc Rules(RulesRequest) returns (RulesResponse) {}

  // SyncRules requests a ruler to asynchronously re-synchronize the rules of 1+ tenants.
  rpc SyncRules(SyncRulesRequest) returns (SyncRulesResponse) {}
}

message RulesRequest {
  enum RuleType {
    AnyRule = 0;
    AlertingRule = 1;
    RecordingRule = 2;
  }
  RuleType filter = 1;
  repeated string rule_name = 2;
  repeated string rule_group = 3;
  repeated string file = 4;
  bool exclude_alerts = 5;
  int32 max_groups = 6;
  string next_token = 7;
}

message RulesResponse {
  repeated GroupStateDesc groups = 1 [(wiresmith.options.pointer) = true];
  repeated string warnings = 2;
}

// SyncRulesRequest is the message sent to request a ruler to re-synchronize the rules of 1+ tenants.
message SyncRulesRequest {
  // The user / tenant IDs for which the rules should be synced.
  repeated string user_ids = 1;
}

// SyncRulesResponse is the message received back for a SyncRulesRequest.
message SyncRulesResponse {}

// GroupStateDesc is a proto representation of a mimir rule group
message GroupStateDesc {
  rules.RuleGroupDesc group = 1 [(wiresmith.options.pointer) = true];
  repeated RuleStateDesc active_rules = 2 [(wiresmith.options.pointer) = true];
  google.protobuf.Timestamp evaluationTimestamp = 3 [(wiresmith.options.stdtime) = true];
  google.protobuf.Duration evaluationDuration = 4 [(wiresmith.options.stdduration) = true];
}

// RuleStateDesc is a proto representation of a Prometheus Rule
message RuleStateDesc {
  rules.RuleDesc rule = 1 [(wiresmith.options.pointer) = true];
  string state = 2;
  string health = 3;
  string lastError = 4;
  repeated AlertStateDesc alerts = 5 [(wiresmith.options.pointer) = true];
  google.protobuf.Timestamp evaluationTimestamp = 6 [(wiresmith.options.stdtime) = true];
  google.protobuf.Duration evaluationDuration = 7 [(wiresmith.options.stdduration) = true];
}

message AlertStateDesc {
  string state = 1;
  repeated cortexpb.LabelPair labels = 2 [(wiresmith.options.customtype) = "github.com/grafana/mimir/pkg/mimirpb.LabelAdapter"];
  repeated cortexpb.LabelPair annotations = 3 [(wiresmith.options.customtype) = "github.com/grafana/mimir/pkg/mimirpb.LabelAdapter"];
  double value = 4;
  google.protobuf.Timestamp active_at = 5 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp fired_at = 6 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp resolved_at = 7 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp last_sent_at = 8 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp valid_until = 9 [(wiresmith.options.stdtime) = true];
  google.protobuf.Timestamp keep_firing_since = 10 [(wiresmith.options.stdtime) = true];
}
