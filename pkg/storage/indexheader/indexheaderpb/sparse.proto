syntax = "proto3";

package indexheaderpb;

import "wiresmith/options.proto";

option go_package = "github.com/grafana/mimir/pkg/storage/indexheader/indexheaderpb";
// Drop the per-message presence bitmap everywhere: the gogo layout had no
// presence tracking for proto3 non-optional fields. The gogo options
// goproto_sizecache_all/goproto_unkeyed_all/goproto_unrecognized_all=false are
// the wiresmith default (no XXX fields are emitted).
option (wiresmith.options.no_presence_all) = true;

message Sparse {
  // pointer=true preserves the *Symbols shape from gogo's nullable=true default.
  Symbols symbols = 1 [(wiresmith.options.pointer) = true];
  // pointer=true preserves the *PostingOffsetTable shape from gogo's nullable=true default.
  PostingOffsetTable postingsOffsetTable = 2 [(wiresmith.options.pointer) = true];
}

message Symbols {
  repeated int64 offsets = 1 [packed = true];
  int64 symbolsCount = 2;
}

message PostingOffsetTable {
  // Postings is a map of label names -> PostingValueOffsets
  map<string, PostingValueOffsets> postings = 1;
  int64 postingOffsetInMemorySampling = 2;
}

// PostingValueOffsets stores a list of the first, last, and every 32nd (config default) PostingOffset for this label name.
message PostingValueOffsets {
  // pointer=true preserves the []*PostingOffset shape from gogo's nullable=true default.
  repeated PostingOffset offsets = 1 [(wiresmith.options.pointer) = true];
  // LastValOffset is the offset of the last value for this label name relative to the start of the postings offset table.
  int64 lastValOffset = 2;
}

// PostingOffset stores the label value and its offset in the postings offset table relative to the start of the table.
message PostingOffset {
  string value = 1;
  int64 tableOff = 2;
}
