syntax = "proto3";

package core;

import "github.com/grafana/mimir/pkg/mimirpb/mimir.proto";
import "github.com/grafana/mimir/pkg/streamingpromql/operators/functions/functions.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "wiresmith/options.proto";

option (wiresmith.options.enum_no_prefix_all) = true;
option (wiresmith.options.no_presence_all) = true;

message PositionRange {
  int64 start = 1 [(wiresmith.options.casttype) = "github.com/prometheus/prometheus/promql/parser/posrange.Pos"];
  int64 end = 2 [(wiresmith.options.casttype) = "github.com/prometheus/prometheus/promql/parser/posrange.Pos"];
}

message BinaryExpressionHints {
  // include lists label names to use as extra selectors on the RHS of a binary
  // operation. Used for "on (labels)" matching. When include is non-empty, only
  // these labels are used to build matchers.
  repeated string include = 1;
  // exclude lists label names that should not be used as extra selectors on
  // the RHS of a binary operation. Used for "ignoring (labels)" / default
  // (no on/ignoring) matching. When include is empty and hints is non-nil,
  // matchers are built from all LHS labels except those in exclude.
  repeated string exclude = 2;
}

message AggregateExpressionDetails {
  AggregationOperation op = 1;
  repeated string grouping = 2;
  bool without = 3;
  PositionRange expressionPosition = 4;
}

// Why don't we just use the parser.ItemType values?
// There's no guarantee these values remain stable, so relying on them could introduce backwards compatibility issues
// if a value changes.
enum AggregationOperation {
  // Please keep these names the same as the corresponding ItemType.

  AGGREGATION_UNKNOWN = 0;
  AGGREGATION_SUM = 1;
  AGGREGATION_AVG = 2;
  AGGREGATION_COUNT = 3;
  AGGREGATION_MIN = 4;
  AGGREGATION_MAX = 5;
  AGGREGATION_GROUP = 6;
  AGGREGATION_STDDEV = 7;
  AGGREGATION_STDVAR = 8;
  AGGREGATION_TOPK = 9;
  AGGREGATION_BOTTOMK = 10;
  AGGREGATION_COUNT_VALUES = 11;
  AGGREGATION_QUANTILE = 12;
  AGGREGATION_LIMITK = 13;
  AGGREGATION_LIMIT_RATIO = 14;
}

message BinaryExpressionDetails {
  BinaryOperation op = 1;
  VectorMatching vectorMatching = 2 [(wiresmith.options.pointer) = true];
  bool returnBool = 3;
  PositionRange expressionPosition = 4;
  BinaryExpressionHints hints = 5 [(wiresmith.options.pointer) = true];
}

// Why don't we just use the parser.ItemType values?
// There's no guarantee these values remain stable, so relying on them could introduce backwards compatibility issues
// if a value changes.
enum BinaryOperation {
  // Please keep these names the same as the corresponding ItemType.

  BINARY_UNKNOWN = 0;
  BINARY_LAND = 1;
  BINARY_LOR = 2;
  BINARY_LUNLESS = 3;
  BINARY_ATAN2 = 4;
  BINARY_SUB = 5;
  BINARY_ADD = 6;
  BINARY_MUL = 7;
  BINARY_MOD = 8;
  BINARY_DIV = 9;
  BINARY_POW = 10;
  BINARY_EQLC = 11; // ==
  BINARY_NEQ = 12; // !=
  BINARY_LTE = 13; // <=
  BINARY_LSS = 14; // <
  BINARY_GTE = 15; // >=
  BINARY_GTR = 16; // >
  BINARY_TRIM_UPPER = 17; // </
  BINARY_TRIM_LOWER = 18; // >/
}

message VectorMatching {
  int64 card = 1 [(wiresmith.options.casttype) = "github.com/prometheus/prometheus/promql/parser.VectorMatchCardinality"];
  repeated string matchingLabels = 2;
  bool on = 3;
  repeated string include = 4;
  VectorMatchFillValues fillValues = 5;
}

message FunctionCallDetails {
  functions.Function function = 1;

  // Labels used by absent() or absent_over_time(). Only populated if this instance is for either of these two functions.
  repeated cortexpb.LabelPair absentLabels = 2 [(wiresmith.options.customtype) = "github.com/grafana/mimir/pkg/mimirpb.LabelAdapter"];

  PositionRange expressionPosition = 3;
}

message NumberLiteralDetails {
  double value = 1;
  PositionRange expressionPosition = 2;
}

message StringLiteralDetails {
  string value = 1;
  PositionRange expressionPosition = 2;
}

message UnaryExpressionDetails {
  UnaryOperation op = 1;
  PositionRange expressionPosition = 2;
}

// Why don't we just use the parser.ItemType values?
// There's no guarantee these values remain stable, so relying on them could introduce backwards compatibility issues
// if a value changes.
enum UnaryOperation {
  // Please keep these names the same as the corresponding ItemType.

  UNARY_UNKNOWN = 0;
  UNARY_SUB = 1;
}

message VectorSelectorDetails {
  repeated LabelMatcher matchers = 1 [(wiresmith.options.pointer) = true];
  google.protobuf.Timestamp timestamp = 2 [(wiresmith.options.stdtime) = true];
  google.protobuf.Duration offset = 3 [(wiresmith.options.stdduration) = true];
  PositionRange expressionPosition = 4;
  bool returnSampleTimestamps = 5;
  bool skipHistogramBuckets = 6;
  bool smoothed = 7;
  reserved 8; // projectionInclude is no longer used.
  reserved 9; // projectionLabels is no longer used.
  bool returnSampleTimestampsPreserveHistograms = 10;

  repeated SubsetMatchers subsets = 11;
}

message MatrixSelectorDetails {
  repeated LabelMatcher matchers = 1 [(wiresmith.options.pointer) = true];
  google.protobuf.Timestamp timestamp = 2 [(wiresmith.options.stdtime) = true];
  google.protobuf.Duration offset = 3 [(wiresmith.options.stdduration) = true];
  google.protobuf.Duration range = 4 [(wiresmith.options.stdduration) = true];
  PositionRange expressionPosition = 5;
  bool skipHistogramBuckets = 6;
  bool smoothed = 7;
  bool anchored = 8;
  bool counterAware = 9;
  reserved 10; // projectionInclude is no longer used.
  reserved 11; // projectionLabels is no longer used.

  repeated SubsetMatchers subsets = 12;

  // anchoredResetsChanges is set when the anchored modifier is applied to resets() or changes(). These
  // functions select the anchor across both floats and histograms rather than synthesising float boundary
  // values, so they take a different path through the range vector selector.
  bool anchoredResetsChanges = 13;
}

// SubsetMatchers defines a subset for a selector to report in its statistics.
// It does not affect the series returned by a selector.
message SubsetMatchers {
  repeated LabelMatcher matchers = 1 [(wiresmith.options.pointer) = true];
}

message SubqueryDetails {
  google.protobuf.Timestamp timestamp = 1 [(wiresmith.options.stdtime) = true];
  google.protobuf.Duration offset = 2 [(wiresmith.options.stdduration) = true];
  google.protobuf.Duration range = 3 [(wiresmith.options.stdduration) = true];
  google.protobuf.Duration step = 4 [(wiresmith.options.stdduration) = true];
  PositionRange expressionPosition = 5;
}

message StepInvariantExpressionDetails {}

message LabelMatcher {
  int64 type = 1 [(wiresmith.options.casttype) = "github.com/prometheus/prometheus/model/labels.MatchType"];
  string name = 2;
  string value = 3;
}

message DeduplicateAndMergeDetails {
  reserved 1;
  reserved "runDelayedNameRemoval";
}

message DropNameDetails {}

message EvaluationRootDetails {}

message NoOpDetails {
  bool matrixSelector = 1;
}

message VectorMatchFillValues {
  double rhs = 1;
  double lhs = 2;
  bool rhsSet = 3;
  bool lhsSet = 4;
}

message DataLabelSelectorDetails {
  repeated LabelMatcher matchers = 1 [(wiresmith.options.pointer) = true];
  PositionRange expressionPosition = 2;
}
