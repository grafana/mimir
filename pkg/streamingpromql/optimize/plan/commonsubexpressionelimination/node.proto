syntax = "proto3";

package commonsubexpressionelimination;

import "github.com/grafana/mimir/pkg/streamingpromql/planning/core/core.proto";
import "wiresmith/options.proto";

option (wiresmith.options.no_presence_all) = true;

message DuplicateDetails {
  // No fields yet.
}

message DuplicateFilterDetails {
  repeated core.LabelMatcher filters = 1 [(wiresmith.options.pointer) = true];
  int64 subsetIndex = 2; // If filters is non-empty, the index in the inner operator's stats that we expect to find the subset statistics for this consumer.
}
