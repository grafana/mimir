syntax = "proto3";

package rangevectorsplitting;

import "github.com/grafana/mimir/pkg/mimirpb/mimir.proto";
import "wiresmith/options.proto";

option (wiresmith.options.no_presence_all) = true;

message SumOverTimeIntermediate {
  double sumF = 1;
  bool hasFloat = 2;
  double sumC = 3;
  cortexpb.Histogram sumH = 4 [(wiresmith.options.pointer) = true];
  bool forceEmptyResult = 5;
}

message SumOverTimeIntermediateList {
  repeated SumOverTimeIntermediate results = 1;
}

message CountOverTimeIntermediate {
  double f = 1;
  bool hasFloat = 2;
}

message CountOverTimeIntermediateList {
  repeated CountOverTimeIntermediate results = 1;
}

message MinMaxOverTimeIntermediate {
  double f = 1;
  bool hasFloat = 2;
  bool hasHistogram = 3;
}

message MinMaxOverTimeIntermediateList {
  repeated MinMaxOverTimeIntermediate results = 1;
}

message RateIntermediate {
  int64 sample_count = 1;
  bool is_histogram = 2;

  // For floats
  cortexpb.Sample first_sample = 3 [(wiresmith.options.pointer) = true];
  cortexpb.Sample last_sample = 4 [(wiresmith.options.pointer) = true];
  double delta = 5;

  // For histograms
  cortexpb.Histogram first_histogram = 10 [(wiresmith.options.pointer) = true];
  cortexpb.Histogram last_histogram = 11 [(wiresmith.options.pointer) = true];
  cortexpb.Histogram delta_histogram = 12 [(wiresmith.options.pointer) = true];
  int64 first_histogram_timestamp = 14;
  int64 last_histogram_timestamp = 15;

  // When true, indicates this split encountered an error condition (e.g., mixed types)
  // and the entire combined result should be empty.
  // The annotation describing the error will have been emitted by this split.
  bool force_empty_result = 16;
}

message RateIntermediateList {
  repeated RateIntermediate results = 1;
}

message FirstLastOverTimeIntermediate {
  double f = 1;
  bool hasFloat = 2;
  cortexpb.Histogram h = 3 [(wiresmith.options.pointer) = true];
}

message FirstLastOverTimeIntermediateList {
  repeated FirstLastOverTimeIntermediate results = 1;
}

message AvgOverTimeIntermediate {
  double sumF = 1;
  double incrementalAvg = 2;
  double countF = 3;
  bool useIncrementalCalc = 4;
  // If the incremental path was used to calculate the average for this piece (useIncrementalCalc is true),
  // this variable carries the compensation for that incremental average.
  // Otherwise, it’s carrying the compensation for the sum.
  double compF = 5;

  cortexpb.Histogram avgH = 6 [(wiresmith.options.pointer) = true];
  int64 countH = 7;
  bool forceEmptyResult = 8;
}

message AvgOverTimeIntermediateList {
  repeated AvgOverTimeIntermediate results = 1;
}

message PresentOverTimeIntermediate {
  bool present = 1;
}

message PresentOverTimeIntermediateList {
  repeated PresentOverTimeIntermediate results = 1;
}
