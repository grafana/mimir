syntax = "proto3";

package rangevectorsplitting;

import "wiresmith/options.proto";

option (wiresmith.options.no_presence_all) = true;

message SplitFunctionCallDetails {
  // Deprecated: no longer populated as of QueryPlanV18. Split ranges are now computed at materialize time.
  reserved 1; // was: splitRanges
  // Deprecated: no longer populated as of QueryPlanV13. The cache key is now derived from the inner node at materialize time.
  reserved 2; // was: innerNodeCacheKey
}
