syntax = "proto3";

package rangevectorsplittingcache;

import "github.com/grafana/mimir/pkg/querier/querierpb/querier.proto";
import "github.com/grafana/mimir/pkg/streamingpromql/types/types.proto";
import "wiresmith/options.proto";

option go_package = "cache";
// no_presence_all keeps gogoproto value semantics (no presence bitmap,
// declared-fields-only struct layout), matching the rest of the cluster.
option (wiresmith.options.no_presence_all) = true;

message CachedSeries {
  // cacheKey contains the non-hashed cache key, to detect hash collision.
  bytes cacheKey = 1;
  int64 start = 2;
  int64 end = 3;
  repeated querierpb.SeriesMetadata series_metadata = 4;
  bytes results = 5;
  querierpb.Annotations annotations = 6;
  types.EncodedOperatorEvaluationStats stats = 7;
}
