syntax = "proto3";

package multiaggregation;

import "github.com/grafana/mimir/pkg/streamingpromql/planning/core/core.proto";
import "wiresmith/options.proto";

option (wiresmith.options.no_presence_all) = true;

message MultiAggregationGroupDetails {}

message MultiAggregationInstanceDetails {
  // Why do this, and not just use AggregateExpressionDetails?
  // This gives us more flexibility to change how multi-aggregations work in the future.
  core.AggregateExpressionDetails aggregation = 1 [(wiresmith.options.pointer) = true];

  repeated core.LabelMatcher filters = 2 [(wiresmith.options.pointer) = true];
  int64 subsetIndex = 3; // If filters is non-empty, the index in the inner operator's stats that we expect to find the subset statistics for this consumer.
}
