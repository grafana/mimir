syntax = "proto3";

package splitandcache;

import "github.com/grafana/mimir/pkg/querier/querierpb/querier.proto";
import "github.com/grafana/mimir/pkg/streamingpromql/types/types.proto";
import "gogoproto/gogo.proto";

option (gogoproto.equal_all) = false;
option (gogoproto.marshaler_all) = true;
option (gogoproto.messagename_all) = true;
option (gogoproto.unmarshaler_all) = true;
option (gogoproto.goproto_sizecache_all) = false;
option (gogoproto.goproto_unkeyed_all) = false;
option (gogoproto.goproto_unrecognized_all) = false;
option (gogoproto.sizer_all) = true;

message CacheEntry {
  bytes cacheKey = 1; // cacheKey is the original (unhashed) cache key, used to detect hash collisions.
  repeated CachedExtent extents = 2 [(gogoproto.nullable) = false]; // Must be sorted by timestamp (ascending) and entries must not overlap.
}

message CachedExtent {
  int64 startT = 1; // Start timestamp, in milliseconds since Unix epoch.
  int64 endT = 2; // End timestamp, in milliseconds since Unix epoch.
  repeated querierpb.SeriesMetadata seriesMetadata = 3 [(gogoproto.nullable) = false];
  repeated querierpb.InstantVectorSeriesData data = 4 [(gogoproto.nullable) = false];
  querierpb.Annotations annotations = 5 [(gogoproto.nullable) = false];
  types.EncodedOperatorEvaluationStats stats = 6 [(gogoproto.nullable) = false];

  // ID of the trace that wrote this extent.
  // If this extent is the combination of multiple separate evaluations, this is the ID of the most recent evaluation.
  string newestEvaluationTraceID = 7;

  // Timestamp of when this extent was evaluated, in milliseconds since Unix epoch.
  // If this extent is the combination of multiple separate evaluations, this is the timestamp of the first evaluation.
  int64 oldestEvaluationTime = 8;
}
