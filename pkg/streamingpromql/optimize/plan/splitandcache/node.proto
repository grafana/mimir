syntax = "proto3";

package splitandcache;

import "google/protobuf/duration.proto";
import "wiresmith/options.proto";

option (wiresmith.options.no_presence_all) = true;

message TimeRangeSplitDetails {
  google.protobuf.Duration splitInterval = 1 [(wiresmith.options.stdduration) = true];
}

message CacheDetails {
  // This should match the parent TimeRangeSplit's splitInterval.
  // It is used to calculate the cache key for each cache entry.
  google.protobuf.Duration splitInterval = 1 [(wiresmith.options.stdduration) = true];
}
