syntax = "proto3";

// TODO: Rename to ingesterpb
package cortex;

import "github.com/grafana/mimir/pkg/mimirpb/mimir.proto";
import "wiresmith/options.proto";

option go_package = "github.com/grafana/mimir/pkg/ingester/client";
// gogoproto emitted unprefixed enum constants (goproto_enum_prefix=false);
// keep that API so existing call sites compile unchanged.
option (wiresmith.options.enum_no_prefix_all) = true;
// Drop the per-message presence bitmap everywhere: the gogo layout had no
// presence tracking for proto3 non-optional fields.
option (wiresmith.options.no_presence_all) = true;

service Ingester {
  rpc Push(cortexpb.WriteRequest) returns (cortexpb.WriteResponse) {}
  rpc QueryStream(QueryRequest) returns (stream QueryStreamResponse) {}
  rpc QueryExemplars(ExemplarQueryRequest) returns (ExemplarQueryResponse) {}

  rpc LabelValues(LabelValuesRequest) returns (LabelValuesResponse) {}
  rpc LabelNames(LabelNamesRequest) returns (LabelNamesResponse) {}
  rpc UserStats(UserStatsRequest) returns (UserStatsResponse) {}
  rpc AllUserStats(UserStatsRequest) returns (UsersStatsResponse) {}
  rpc MetricsForLabelMatchers(MetricsForLabelMatchersRequest) returns (MetricsForLabelMatchersResponse) {}
  rpc MetricsMetadata(MetricsMetadataRequest) returns (MetricsMetadataResponse) {}

  // LabelNamesAndValues provides all values for each label that matches the matchers.
  // The order of the labels and values is not guaranteed.
  rpc LabelNamesAndValues(LabelNamesAndValuesRequest) returns (stream LabelNamesAndValuesResponse) {}

  // LabelValuesCardinality returns all values and series total count for label_names labels
  // that match the matchers.
  // The listing order of the labels is not guaranteed.
  rpc LabelValuesCardinality(LabelValuesCardinalityRequest) returns (stream LabelValuesCardinalityResponse) {}

  rpc ActiveSeries(ActiveSeriesRequest) returns (stream ActiveSeriesResponse) {}

  // SearchLabelNames streams label names matching the search filter.
  rpc SearchLabelNames(SearchLabelNamesRequest) returns (stream SearchResultBatch) {}

  // SearchLabelValues streams label values for the given label name matching the search filter.
  rpc SearchLabelValues(SearchLabelValuesRequest) returns (stream SearchResultBatch) {}

  // When adding more read-path methods here, please update ingester_read_path_routes_regex in operations/mimir-mixin/config.libsonnet as well.
}

message LabelNamesAndValuesRequest {
  // pointer=true preserves the []*LabelMatcher shape from gogo's nullable=true default.
  repeated LabelMatcher matchers = 1 [(wiresmith.options.pointer) = true];
  CountMethod count_method = 2;
}

message LabelNamesAndValuesResponse {
  // pointer=true preserves the []*LabelValues shape from gogo's nullable=true default.
  repeated LabelValues items = 1 [(wiresmith.options.pointer) = true];
}

message LabelValues {
  string label_name = 1;
  repeated string values = 2;
}

enum CountMethod {
  IN_MEMORY = 0;
  ACTIVE = 1;
}

message LabelValuesCardinalityRequest {
  repeated string label_names = 1;
  // pointer=true preserves the []*LabelMatcher shape from gogo's nullable=true default.
  repeated LabelMatcher matchers = 2 [(wiresmith.options.pointer) = true];
  CountMethod count_method = 3;
}

message LabelValuesCardinalityResponse {
  // pointer=true preserves the []*LabelValueSeriesCount shape from gogo's nullable=true default.
  repeated LabelValueSeriesCount items = 1 [(wiresmith.options.pointer) = true];
}

message LabelValueSeriesCount {
  string label_name = 1;
  map<string, uint64> label_value_series = 2;
}

message QueryRequest {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  // pointer=true preserves the []*LabelMatcher shape from gogo's nullable=true default.
  repeated LabelMatcher matchers = 3 [(wiresmith.options.pointer) = true];
  reserved 4; // projections include, not used anymore.
  reserved 5; // projections labels, not used anymore.

  // Why 100? This QueryRequest message is also used for remote read requests, so we need to avoid any field numbers added in the future.
  uint64 streaming_chunks_batch_size = 100;
}

message ExemplarQueryRequest {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  // pointer=true preserves the []*LabelMatchers shape from gogo's nullable=true default.
  repeated LabelMatchers matchers = 3 [(wiresmith.options.pointer) = true];
}

message ActiveSeriesRequest {
  // pointer=true preserves the []*LabelMatcher shape from gogo's nullable=true default.
  repeated LabelMatcher matchers = 1 [(wiresmith.options.pointer) = true];
  enum RequestType {
    SERIES = 0;
    NATIVE_HISTOGRAM_SERIES = 1;
  }
  RequestType type = 2;
}

// SearchOrdering selects the result ordering wire-side. Values mirror the
// Prometheus storage.Ordering enum so the server-side translation is 1:1.
enum SearchOrdering {
  ORDER_BY_VALUE_ASC = 0;
  ORDER_BY_VALUE_DESC = 1;
  ORDER_BY_SCORE_DESC = 2;
}

// SearchFilter is the wire encoding of the filter applied to a search
// request. Field names match Prometheus PR #18573's HTTP URL params so the
// HTTP-to-gRPC translation in the querier (later PR) is verbatim.
message SearchFilter {
  // Terms are the search terms; combined with OR-max by filterOr at the server.
  repeated string terms = 1;
  // CaseInsensitive flips the search to be case-insensitive. The proto3 zero
  // value (false) means case-sensitive — matching Prometheus's HTTP
  // case_sensitive URL-param default of true. The HTTP handler in the later
  // PR translates the URL param to this wire bit (case_sensitive=false URL
  // param → case_insensitive=true wire bit).
  bool case_insensitive = 2;

  enum FuzzAlg {
    FUZZ_ALG_SUBSEQUENCE = 0;
    FUZZ_ALG_JARO_WINKLER = 1;
  }
  FuzzAlg fuzz_alg = 3;
  // FuzzThreshold is the minimum fuzzy score expressed as int 0-100,
  // matching Prometheus PR #18573's fuzz_threshold URL param. The server
  // divides by 100 to compare against the matcher's [0,1] score.
  int32 fuzz_threshold = 4;
}

message SearchLabelNamesRequest {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  // pointer=true preserves the []*LabelMatcher shape from gogo's nullable=true default.
  repeated LabelMatcher matchers = 3 [(wiresmith.options.pointer) = true];
  SearchFilter filter = 4;
  SearchOrdering ordering = 5;
  // Limit caps the number of accepted results; 0 means no limit.
  int64 limit = 6;
}

message SearchLabelValuesRequest {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  // Name is the label whose values are searched.
  string name = 3;
  // pointer=true preserves the []*LabelMatcher shape from gogo's nullable=true default.
  repeated LabelMatcher matchers = 4 [(wiresmith.options.pointer) = true];
  SearchFilter filter = 5;
  SearchOrdering ordering = 6;
  int64 limit = 7;
  // IncludeMetadata asks the ingester to enrich each result's Metadata field
  // with the per-tenant MetricMetadata when name == "__name__". Has no effect
  // for any other label name. Ignored by sources without metric metadata
  // (e.g. store-gateway).
  bool include_metadata = 8;
}

// SearchResultBatch carries one batch of (value, score) pairs in a streaming
// reply. Both SearchLabel{Names,Values} use this shape. Warnings, when
// present, accompany the final batch of a stream and carry annotations
// produced by the underlying Searcher.
message SearchResultBatch {
  message Result {
    string value = 1;
    double score = 2;
    // Metadata is populated only when the request set include_metadata=true
    // and the underlying source has metric metadata for value. Nil otherwise.
    // pointer=true preserves the *cortexpb.MetricMetadata shape from gogo's nullable=true default.
    cortexpb.MetricMetadata metadata = 3 [(wiresmith.options.pointer) = true];
  }
  // no_presence_all makes the repeated-message default value-form ([]Result),
  // matching gogo's nullable=false layout.
  repeated Result results = 1;
  repeated string warnings = 2;
}

// QueryStreamResponse contains either:
// - a batch of series labels (sorted in series order), with is_end_of_series_stream=true for the last batch or
// - a batch of chunks (sorted in series order).
//
// Only one of these two options will be populated.
message QueryStreamResponse {
  reserved 1; // "chunkseries" aren't used anymore, only streaming series.
  reserved 2; // "timeseries" aren't used anymore, only streaming series.

  // no_presence_all makes repeated-message default value-form ([]QueryStreamSeries),
  // matching gogo's nullable=false layout.
  repeated QueryStreamSeries streaming_series = 3;
  bool is_end_of_series_stream = 4;

  // Same value-form default as streaming_series.
  repeated QueryStreamSeriesChunks streaming_series_chunks = 5;
}

message QueryStreamSeries {
  // LabelAdapter reuses the mimirpb wiresmith customtype adapters; see
  // pkg/mimirpb/wiresmith_adapters.go. no_presence_all makes this value-form
  // ([]LabelAdapter), matching gogo's nullable=false + customtype layout.
  repeated cortexpb.LabelPair labels = 1 [(wiresmith.options.customtype) = "github.com/grafana/mimir/pkg/mimirpb.LabelAdapter"];
  int64 chunk_count = 2;
}

message QueryStreamSeriesChunks {
  uint64 series_index = 1; // Index into list of all series previously sent with QueryStreamSeries messages by this ingester during this query response.
  // no_presence_all makes this value-form ([]Chunk), matching gogo nullable=false.
  repeated Chunk chunks = 2;
}

message ExemplarQueryResponse {
  // no_presence_all makes this value-form ([]TimeSeries), matching gogo nullable=false.
  repeated cortexpb.TimeSeries timeseries = 1;
}

message LabelValuesRequest {
  string label_name = 1;
  int64 start_timestamp_ms = 2;
  int64 end_timestamp_ms = 3;
  // pointer=true preserves the *LabelMatchers shape from gogo's nullable=true default.
  LabelMatchers matchers = 4 [(wiresmith.options.pointer) = true];
  int64 limit = 5;
}

message LabelValuesResponse {
  repeated string label_values = 1;
}

message LabelNamesRequest {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  // pointer=true preserves the *LabelMatchers shape from gogo's nullable=true default.
  LabelMatchers matchers = 3 [(wiresmith.options.pointer) = true];
  int64 limit = 4;
}

message LabelNamesResponse {
  repeated string label_names = 1;
}

message UserStatsRequest {
  CountMethod count_method = 1;
}

message UserStatsResponse {
  double ingestion_rate = 1;
  uint64 num_series = 2;
  double api_ingestion_rate = 3;
  double rule_ingestion_rate = 4;
}

message UserIDStatsResponse {
  string user_id = 1;
  // pointer=true preserves the *UserStatsResponse shape from gogo's nullable=true default.
  UserStatsResponse data = 2 [(wiresmith.options.pointer) = true];
}

message UsersStatsResponse {
  // pointer=true preserves the []*UserIDStatsResponse shape from gogo's nullable=true default.
  repeated UserIDStatsResponse stats = 1 [(wiresmith.options.pointer) = true];
}

message MetricsForLabelMatchersRequest {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  // pointer=true preserves the []*LabelMatchers shape from gogo's nullable=true default.
  repeated LabelMatchers matchers_set = 3 [(wiresmith.options.pointer) = true];
  int64 limit = 4;
}

message MetricsForLabelMatchersResponse {
  // pointer=true preserves the []*cortexpb.Metric shape from gogo's nullable=true default.
  repeated cortexpb.Metric metric = 1 [(wiresmith.options.pointer) = true];
}

message MetricsMetadataRequest {
  sint32 limit = 1;
  sint32 limit_per_metric = 2;
  string metric = 3;
}

message MetricsMetadataResponse {
  // pointer=true preserves the []*cortexpb.MetricMetadata shape from gogo's nullable=true default.
  repeated cortexpb.MetricMetadata metadata = 1 [(wiresmith.options.pointer) = true];
}

message ActiveSeriesResponse {
  // pointer=true preserves the []*cortexpb.Metric shape from gogo's nullable=true default.
  repeated cortexpb.Metric metric = 1 [(wiresmith.options.pointer) = true];
  // bucket_count is only used when the request type was NATIVE_HISTOGRAM_SERIES.
  // bucket_count contains the native histogram active buckets count for each series in "metric" above.
  repeated uint64 bucket_count = 2;
}

message Chunk {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  int32 encoding = 3;
  // UnsafeByteSlice zero-copies the gRPC frame bytes; see wiresmith_adapters.go.
  // customtype contract methods live in pkg/mimirpb/wiresmith_adapters.go.
  bytes data = 4 [(wiresmith.options.customtype) = "github.com/grafana/mimir/pkg/mimirpb.UnsafeByteSlice"];
}

message LabelMatchers {
  // pointer=true preserves the []*LabelMatcher shape from gogo's nullable=true default.
  repeated LabelMatcher matchers = 1 [(wiresmith.options.pointer) = true];
}

enum MatchType {
  EQUAL = 0;
  NOT_EQUAL = 1;
  REGEX_MATCH = 2;
  REGEX_NO_MATCH = 3;
}

message LabelMatcher {
  MatchType type = 1;
  string name = 2;
  string value = 3;
}
