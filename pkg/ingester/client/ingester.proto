syntax = "proto3";

// TODO: Rename to ingesterpb
package cortex;

import "github.com/grafana/mimir/pkg/mimirpb/mimir.proto";
import "gogoproto/gogo.proto";

option go_package = "client";
option (gogoproto.marshaler_all) = true;
option (gogoproto.unmarshaler_all) = true;

service Ingester {
  rpc Push(cortexpb.WriteRequest) returns (cortexpb.WriteResponse) {}
  rpc QueryStream(QueryRequest) returns (stream QueryStreamResponse) {}
  rpc QueryExemplars(ExemplarQueryRequest) returns (ExemplarQueryResponse) {}

  rpc LabelValues(LabelValuesRequest) returns (LabelValuesResponse) {}
  rpc LabelNames(LabelNamesRequest) returns (LabelNamesResponse) {}
  rpc UserStats(UserStatsRequest) returns (UserStatsResponse) {}
  rpc AllUserStats(UserStatsRequest) returns (UsersStatsResponse) {}
  rpc MetricsForLabelMatchers(MetricsForLabelMatchersRequest) returns (MetricsForLabelMatchersResponse) {}
  rpc MetricsMetadata(MetricsMetadataRequest) returns (MetricsMetadataResponse) {}

  // LabelNamesAndValues provides all values for each label that matches the matchers.
  // The order of the labels and values is not guaranteed.
  rpc LabelNamesAndValues(LabelNamesAndValuesRequest) returns (stream LabelNamesAndValuesResponse) {}

  // LabelValuesCardinality returns all values and series total count for label_names labels
  // that match the matchers.
  // The listing order of the labels is not guaranteed.
  rpc LabelValuesCardinality(LabelValuesCardinalityRequest) returns (stream LabelValuesCardinalityResponse) {}

  rpc ActiveSeries(ActiveSeriesRequest) returns (stream ActiveSeriesResponse) {}

  rpc HashRangeStats(HashRangeStatsRequest) returns (HashRangeStatsResponse) {}
  rpc SetHashRanges(SetHashRangesRequest) returns (SetHashRangesResponse) {}
  rpc GetHashRanges(GetHashRangesRequest) returns (GetHashRangesResponse) {}

  // When adding more read-path methods here, please update ingester_read_path_routes_regex in operations/mimir-mixin/config.libsonnet as well.
}

message HashRangeStatsRequest {}

message HashRangeRate {
  uint32 lo = 1;
  uint32 hi = 2;
  reserved 3; // formerly samples_per_second; dropped when the rebalancer
  // switched to a series-only load model.
  int64 active_series = 4;
  // partition_id is the Kafka partition whose TSDB head contains the
  // active_series counted in this entry. The same (lo, hi) range can
  // appear multiple times in a single HashRangeStatsResponse when more
  // than one of the reporter's partitions has head series with hashes
  // in the range — typically the current owner of the range (growth)
  // plus any partitions that used to own it and still hold the series
  // as head residue until the next compaction. The rebalancer keys
  // load by (partition_id, range) so it can attribute residue to the
  // partition that actually has it, instead of summing it onto the
  // current owner. Zero is a valid partition id; the field is required
  // for readcache reporters and ignored by ingester reporters.
  int32 partition_id = 5;
}

message HashRangeStatsResponse {
  // rates is a misnomer left over from an earlier load model that
  // included a samples/sec EWMA per range. The field now carries only
  // per-range active-series counts; see HashRangeRate.
  repeated HashRangeRate rates = 1 [(gogoproto.nullable) = false];
  // total_active_series is the total number of in-memory series on the
  // ingester, across all tenants. It includes series whose hashes fall
  // outside of any currently-owned range (i.e. series the ingester used
  // to own but that haven't yet been GC'd by head compaction). The
  // rebalancer can compare this to sum(rates[].active_series) to detect
  // stale post-move cardinality and weight source-side load accordingly.
  int64 total_active_series = 2;
  // unnamed_query_samples_ewma is the EWMA of samples-per-second
  // scanned by queries that arrived without an attribution hint
  // (full-fanout queries: no resolvable __name__, complex regexes,
  // count({namespace="prod"})-style queries). Reported per ingester;
  // the rebalancer surfaces it as an observability gauge but does not
  // feed it into per-partition deltas, because the work is intrinsic
  // to "scour all owned partitions" and can't be moved to a specific
  // partition.
  double unnamed_query_samples_ewma = 3;
  // partition_query_loads carries per-partition EWMAs of samples-per-
  // second scanned by queries the distributor attributed to that
  // partition via QueryRequest.query_attribution_hint. Today an
  // ingester typically owns one partition (1:1) so this is a single
  // entry; under the future N:1 architecture (David I) it carries one
  // entry per owned partition.
  repeated PartitionQueryLoad partition_query_loads = 4 [(gogoproto.nullable) = false];
  // partition_active_series carries per-partition TSDB head-series
  // counts. Readcache reports one entry per Kafka partition it
  // currently holds; the rebalancer uses these for partition-level L
  // instead of fanning out instance totals.
  repeated PartitionActiveSeries partition_active_series = 5 [(gogoproto.nullable) = false];
}

message PartitionQueryLoad {
  int32 partition_id = 1;
  double samples_ewma = 2;
}

message PartitionActiveSeries {
  int32 partition_id = 1;
  int64 active_series = 2;
}

message HashRangeEntry {
  uint32 lo = 1;
  uint32 hi = 2;
  // partition_id is the Kafka partition this range is currently
  // assigned to. SetHashRanges uses it to route the new range set to
  // the right per-partition bookkeeping on the readcache; GetHashRanges
  // returns it so the rebalancer can rebuild a (partition, range)
  // assignment from what the readcache currently believes it owns.
  // Zero is a valid partition id.
  int32 partition_id = 3;
}

message SetHashRangesRequest {
  repeated HashRangeEntry ranges = 1 [(gogoproto.nullable) = false];
}

message SetHashRangesResponse {}

message GetHashRangesRequest {}

message GetHashRangesResponse {
  repeated HashRangeEntry ranges = 1 [(gogoproto.nullable) = false];
}

message LabelNamesAndValuesRequest {
  repeated LabelMatcher matchers = 1;
  CountMethod count_method = 2;
}

message LabelNamesAndValuesResponse {
  repeated LabelValues items = 1;
}

message LabelValues {
  string label_name = 1;
  repeated string values = 2;
}

enum CountMethod {
  IN_MEMORY = 0;
  ACTIVE = 1;
}

message LabelValuesCardinalityRequest {
  repeated string label_names = 1;
  repeated LabelMatcher matchers = 2;
  CountMethod count_method = 3;
}

message LabelValuesCardinalityResponse {
  repeated LabelValueSeriesCount items = 1;
}

message LabelValueSeriesCount {
  string label_name = 1;
  map<string, uint64> label_value_series = 2;
}

message QueryRequest {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  repeated LabelMatcher matchers = 3;
  bool projection_include = 4;
  repeated string projection_labels = 5;

  // query_attribution_hint records the routing decision the
  // distributor (or future querier) made for this call. nil means no
  // single-partition decision (full fan-out, old sender that doesn't
  // populate the field, or resolution failed). Non-nil names the
  // partition this call was routed for: the ingester buckets samples-
  // scanned by partition_id for query-load attribution, and (under
  // the future per-(tenant, partition) TSDB architecture, David I)
  // uses it as a TSDB selector. The field is intentionally nullable:
  // partition 0 is a real partition, so we cannot use a sentinel int
  // to mean "unset" without conflating it with partition 0.
  QueryAttributionHint query_attribution_hint = 6;

  // Why 100? This QueryRequest message is also used for remote read requests, so we need to avoid any field numbers added in the future.
  uint64 streaming_chunks_batch_size = 100;
}

message QueryAttributionHint {
  int32 partition_id = 1;
}

message ExemplarQueryRequest {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  repeated LabelMatchers matchers = 3;
}

message ActiveSeriesRequest {
  repeated LabelMatcher matchers = 1;
  enum RequestType {
    SERIES = 0;
    NATIVE_HISTOGRAM_SERIES = 1;
  }
  RequestType type = 2;
}

// QueryStreamResponse contains either:
// - a batch of series labels (sorted in series order), with is_end_of_series_stream=true for the last batch or
// - a batch of chunks (sorted in series order).
//
// Only one of these two options will be populated.
message QueryStreamResponse {
  reserved 1; // "chunkseries" aren't used anymore, only streaming series.
  reserved 2; // "timeseries" aren't used anymore, only streaming series.

  repeated QueryStreamSeries streaming_series = 3 [(gogoproto.nullable) = false];
  bool is_end_of_series_stream = 4;

  repeated QueryStreamSeriesChunks streaming_series_chunks = 5 [(gogoproto.nullable) = false];
}

message QueryStreamSeries {
  repeated cortexpb.LabelPair labels = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "github.com/grafana/mimir/pkg/mimirpb.LabelAdapter"
  ];
  int64 chunk_count = 2;
}

message QueryStreamSeriesChunks {
  uint64 series_index = 1; // Index into list of all series previously sent with QueryStreamSeries messages by this ingester during this query response.
  repeated Chunk chunks = 2 [(gogoproto.nullable) = false];
}

message ExemplarQueryResponse {
  repeated cortexpb.TimeSeries timeseries = 1 [(gogoproto.nullable) = false];
}

message LabelValuesRequest {
  string label_name = 1;
  int64 start_timestamp_ms = 2;
  int64 end_timestamp_ms = 3;
  LabelMatchers matchers = 4;
  int64 limit = 5;
}

message LabelValuesResponse {
  repeated string label_values = 1;
}

message LabelNamesRequest {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  LabelMatchers matchers = 3;
  int64 limit = 4;
}

message LabelNamesResponse {
  repeated string label_names = 1;
}

message UserStatsRequest {
  CountMethod count_method = 1;
}

message UserStatsResponse {
  double ingestion_rate = 1;
  uint64 num_series = 2;
  double api_ingestion_rate = 3;
  double rule_ingestion_rate = 4;
}

message UserIDStatsResponse {
  string user_id = 1;
  UserStatsResponse data = 2;
}

message UsersStatsResponse {
  repeated UserIDStatsResponse stats = 1;
}

message MetricsForLabelMatchersRequest {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  repeated LabelMatchers matchers_set = 3;
  int64 limit = 4;
}

message MetricsForLabelMatchersResponse {
  repeated cortexpb.Metric metric = 1;
}

message MetricsMetadataRequest {
  sint32 limit = 1;
  sint32 limit_per_metric = 2;
  string metric = 3;
}

message MetricsMetadataResponse {
  repeated cortexpb.MetricMetadata metadata = 1;
}

message ActiveSeriesResponse {
  repeated cortexpb.Metric metric = 1;
  // bucket_count is only used when the request type was NATIVE_HISTOGRAM_SERIES.
  // bucket_count contains the native histogram active buckets count for each series in "metric" above.
  repeated uint64 bucket_count = 2;
}

message Chunk {
  int64 start_timestamp_ms = 1;
  int64 end_timestamp_ms = 2;
  int32 encoding = 3;
  bytes data = 4 [
    (gogoproto.nullable) = false,
    (gogoproto.customtype) = "github.com/grafana/mimir/pkg/mimirpb.UnsafeByteSlice"
  ];
}

message LabelMatchers {
  repeated LabelMatcher matchers = 1;
}

enum MatchType {
  EQUAL = 0;
  NOT_EQUAL = 1;
  REGEX_MATCH = 2;
  REGEX_NO_MATCH = 3;
}

message LabelMatcher {
  MatchType type = 1;
  string name = 2;
  string value = 3;
}
