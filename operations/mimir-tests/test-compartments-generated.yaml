      containers:
      - args:
        - -alertmanager-storage.gcs.bucket-name=alerts-bucket
        - -alertmanager.sharding-ring.replication-factor=3
        - -alertmanager.sharding-ring.store=memberlist
        - -alertmanager.storage.path=/data
        - -alertmanager.web.external-url=http://test/alertmanager
        - -common.storage.backend=gcs
        - -ingest-storage.enabled=true
        - -ingest-storage.kafka.address=kafka.default.svc.cluster.local.:9092
        - -ingest-storage.kafka.auto-create-topic-default-partitions=1000
        - -ingest-storage.kafka.topic=ingest
        - -memberlist.abort-if-fast-join-fails=true
        - -memberlist.abort-if-fast-join-fails-min-nodes=2
        - -memberlist.bind-port=7946
        - -memberlist.join=dns+memberlist-bridge-zone-a.default.svc.cluster.local.:7946,dns+memberlist-bridge-zone-b.default.svc.cluster.local.:7946
        - -memberlist.rejoin-interval=300s
        - -memberlist.rejoin-seed-nodes=dns+memberlist-bridge-zone-a.default.svc.cluster.local.:7946
        - -runtime-config.file=/etc/mimir/overrides.yaml
        - -server.grpc.keepalive.min-time-between-pings=10s
        - -server.grpc.keepalive.ping-without-stream-allowed=true
        - -server.http-idle-timeout=6m
        - -server.http-listen-port=8080
        - -target=alertmanager
        - -usage-stats.installation-mode=jsonnet
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        image: grafana/mimir:3.1.2
        imagePullPolicy: IfNotPresent
        name: alertmanager
        ports:
        - containerPort: 8080
          name: http-metrics
        - containerPort: 9095
          name: grpc
        - containerPort: 7946
          name: gossip-ring
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 15
          timeoutSeconds: 1
        resources:
          limits:
            memory: 15Gi
          requests:
            cpu: "2"
            memory: 10Gi
        volumeMounts:
        - mountPath: /data
          name: alertmanager-data
        - mountPath: /etc/mimir
          name: overrides
      securityContext:
        runAsUser: 0
      terminationGracePeriodSeconds: 900
      volumes:
      - configMap:
          name: overrides
        name: overrides
  updateStrategy:
    type: RollingUpdate
  volumeClaimTemplates:
