apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    mimir-service: distributor-zone-a
  name: distributor-zone-a-wc-0
  namespace: default
spec:
  minReadySeconds: 10
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      name: distributor-zone-a-wc-0
  strategy:
    rollingUpdate:
      maxSurge: 15%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        gossip_ring_member: "true"
        mimir-service: distributor-zone-a
        mimir-wc: "0"
        name: distributor-zone-a-wc-0
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values:
                - us-east-2a
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: mimir-wc
                operator: Exists
              - key: mimir-wc
                operator: NotIn
                values:
                - "0"
            topologyKey: kubernetes.io/hostname
      containers:
      - args:
        - -compartments.enabled=true
        - -compartments.read.num-compartments=2
        - -compartments.write.num-compartments=2
        - -distributor.ha-tracker.enable=true
        - -distributor.ha-tracker.enable-for-all-users=true
        - -distributor.ha-tracker.prefix=prom_ha/
        - -distributor.ha-tracker.store=memberlist
        - -distributor.health-check-ingesters=true
        - -distributor.ingestion-burst-size=200000
        - -distributor.ingestion-rate-limit=10000
        - -distributor.ingestion-tenant-shard-size=3
        - -distributor.remote-timeout=5s
        - -distributor.ring.heartbeat-period=1m
        - -distributor.ring.heartbeat-timeout=4m
        - -distributor.ring.prefix=
        - -distributor.ring.store=memberlist
        - -distributor.write-compartment-id=0
        - -ingest-storage.enabled=true
        - -ingest-storage.ingestion-partition-tenant-shard-size=1
        - -ingest-storage.kafka.address=kafka-wc-0.default.svc.cluster.local.:9092
        - -ingest-storage.kafka.auto-create-topic-default-partitions=1000
        - -ingest-storage.kafka.producer-record-version=2
        - -ingest-storage.kafka.topic=ingest-rc-<read-compartment-id>
        - -ingester.partition-ring.prefix=
        - -ingester.ring.heartbeat-timeout=10m
        - -ingester.ring.prefix=partition-ingesters/
        - -ingester.ring.replication-factor=3
        - -ingester.ring.store=memberlist
        - -ingester.ring.zone-awareness-enabled=true
        - -mem-ballast-size-bytes=1073741824
        - -memberlist.abort-if-fast-join-fails=true
        - -memberlist.abort-if-fast-join-fails-min-nodes=2
        - -memberlist.bind-port=7946
        - -memberlist.join=dns+memberlist-bridge-zone-a.default.svc.cluster.local.:7946,dns+memberlist-bridge-zone-b.default.svc.cluster.local.:7946
        - -memberlist.rejoin-interval=300s
        - -memberlist.rejoin-seed-nodes=dns+memberlist-bridge-zone-a.default.svc.cluster.local.:7946
        - -memberlist.zone-aware-routing.enabled=true
        - -memberlist.zone-aware-routing.instance-availability-zone=zone-a
        - -memberlist.zone-aware-routing.role=member
        - -runtime-config.file=/etc/mimir/overrides.yaml
        - -server.grpc-max-concurrent-streams=1000
        - -server.grpc.keepalive.max-connection-age=60s
        - -server.grpc.keepalive.max-connection-age-grace=5m
        - -server.grpc.keepalive.max-connection-idle=1m
        - -server.grpc.keepalive.min-time-between-pings=10s
        - -server.grpc.keepalive.ping-without-stream-allowed=true
        - -server.http-listen-port=8080
        - -shutdown-delay=90s
        - -target=distributor
        - -usage-stats.installation-mode=jsonnet
        env:
        - name: GOMAXPROCS
          value: "8"
        image: grafana/mimir:3.1.2
        imagePullPolicy: IfNotPresent
        name: distributor
        ports:
        - containerPort: 8080
          name: http-metrics
        - containerPort: 9095
          name: grpc
        - containerPort: 7946
          name: gossip-ring
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 15
          timeoutSeconds: 1
        resources:
          limits:
            memory: 4Gi
          requests:
            cpu: "2"
            ephemeral-storage: 50Mi
            memory: 2Gi
        volumeMounts:
        - mountPath: /etc/mimir
          name: overrides
      terminationGracePeriodSeconds: 100
      tolerations:
      - effect: NoSchedule
        key: topology
        operator: Equal
        value: secondary-az
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            name: distributor-zone-a-wc-0
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
      volumes:
      - configMap:
          name: overrides
        name: overrides
---
