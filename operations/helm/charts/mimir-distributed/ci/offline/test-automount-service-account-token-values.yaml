# Pin kube version so results are the same for running in CI and locally where the installed kube version may be different.
kubeVersionOverride: "1.32"

# Enable Mimir's native Vault support with Kubernetes authentication. Components that consume the
# Mimir configuration automatically keep the ServiceAccount token mounted so they can log in to Vault.
mimir:
  structuredConfig:
    vault:
      enabled: true
      url: https://vault.example.svc:8200
      mount_path: secret
      auth:
        type: kubernetes
        kubernetes:
          role_name: mimir

# An explicit per-component override wins over the Vault-based automatic detection.
distributor:
  automountServiceAccountToken: false

# An explicit opt-in on a component that would otherwise default to false.
chunks-cache:
  enabled: true
  automountServiceAccountToken: true
