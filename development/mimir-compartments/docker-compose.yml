    "environment":
      - "CLUSTER_ID=zH1GDqcNTzGMDCXm5VZQdg"
      - "KAFKA_NUM_PARTITIONS=100"
      - "KAFKA_PROCESS_ROLES=broker,controller"
      - "KAFKA_BROKER_ID=1"
      - "KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      - "KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT"
      - "KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER"
      - "KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-wc-0:9093"
      - "KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1"
      - "KAFKA_DEFAULT_REPLICATION_FACTOR=1"
      - "KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1"
      - "KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1"
      - "KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=10000"
      - "KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092"
      - "KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-wc-0:9092,PLAINTEXT_HOST://localhost:29092"
    "healthcheck":
      "interval": "1s"
      "retries": "30"
      "start_period": "1s"
      "test": "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"
      "timeout": "1s"
    "hostname": "kafka-wc-0"
    "image": "confluentinc/cp-kafka:latest"
    "ports":
      - "29092:29092"
